<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details - Closet Swap</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Closet Swap</a>
            <nav>
                <a href="browse.html">Browse</a>
                <a href="post.html">Post</a>
                <a href="profile.html">Profile</a>
                <a href="login.html" id="login-link">Login</a>
                <a href="#" id="logout-link" style="display:none;">Logout</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="item-detail" style="margin: 2rem 0;">
            <!-- Item details will be inserted here -->
        </div>
        <div id="offer-section" style="margin-top: 2rem;">
            <!-- Swap offer button (if logged in) -->
        </div>
        <!-- Swap Offer Modal -->
        <div id="offer-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Select an item to offer</h3>
            <div id="user-items-list" class="card-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
            <!-- User's items will appear here -->
            </div>
            <button id="cancel-offer" class="btn btn-outline" style="margin-top: 1rem;">Cancel</button>
        </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Closet Swap. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/item.js"></script>
</body>
</html>
