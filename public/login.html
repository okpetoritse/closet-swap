<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Closet Swap</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Closet Swap</a>
            <nav>
                <a href="browse.html"><i class="fas fa-compass"></i><span class="nav-text">Browse</span></a>
                <a href="post.html"><i class="fas fa-plus-square"></i><span class="nav-text">Post</span></a>
                <a href="profile.html"><i class="fas fa-user"></i><span class="nav-text">Profile</span></a>
                <a href="login.html" id="login-link"><i class="fas fa-sign-in-alt"></i><span class="nav-text">Login</span></a>
                <a href="#" id="logout-link" style="display:none;"><i class="fas fa-sign-out-alt"></i><span class="nav-text">Logout</span></a>
            </nav>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn" style="width:100%;">Log In</button>
            </form>

            <hr style="margin: 2rem 0; border: 1px solid var(--border);">

            <h2 style="text-align: center; margin-bottom: 1.5rem;">New here?</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-secondary" style="width:100%;">Sign Up</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Closet Swap. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
